version: "3.9"
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-python
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=orders_db
    ports:
      - "5001:5001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - python-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5001/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: db-python
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=orders_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata_python:/var/lib/postgresql/data
      - ../shared/db-init:/docker-entrypoint-initdb.d:ro
    networks:
      - python-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orders_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_python:

networks:
  python-net:
    driver: bridge
