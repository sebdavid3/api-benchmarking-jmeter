# ============================================================
# Base de Datos Compartida (uso exclusivo para DESARROLLO)
# NO usar esta instancia para el benchmarking final.
# Cada stack debe tener su propia DB para mediciones aisladas.
# ============================================================
version: "3.9"
services:
  db:
    image: postgres:16-alpine
    container_name: db-shared
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=orders_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata_shared:/var/lib/postgresql/data
      - ../db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orders_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - shared-net

volumes:
  pgdata_shared:

networks:
  shared-net:
    driver: bridge
